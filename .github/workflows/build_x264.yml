on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      test_build:
        required: false
        type: boolean
        default: false
    secrets:
      RPM_SIGNING_KEY:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      R2_ENDPOINT:
        required: false

name: Create RPM Release

permissions: {}

jobs:
  buildsrpm:
    name: Build SRPM
    if: github.triggering_actor == 'royaloughtness'
    runs-on: ${{ inputs.arch == 'x86_64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    container:
      image: ${{ inputs.arch == 'x86_64' && 'fedora:43@sha256:b8f499bee9c97c7c1be0ff7b8b6e4ab72af4216c30d2365c9d474ce2d5c5fd9a' || 'fedora:43@sha256:b5bf856429ce79986e9d80bf58766f6d5b7fad6dab717314539cb7cd0e280f45' }}
    steps:
      - name: Enable egress auditing
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Build SRPM
        shell: bash
        id: srpm_build
        run: |
          dnf update -y
          dnf install git wget rpmbuild yum-utils rpm-sign rpmdevtools -y
          git clone --branch "fedora-43" https://github.com/negativo17/x264.git
          mv x264/* .
          bash x264-snapshot.sh
          rpmbuild -bs -v --define "_sourcedir $PWD" --define "_rpmdir $PWD" --define "_builddir $PWD" --define "_specdir $PWD" --define "_srcrpmdir $PWD" x264.spec
          SRPM_HASH=$(sha256sum *.rpm)
          echo "SRPM_HASH: ${SRPM_HASH}"

      - name: Save SRPM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: srpm-artifact
          path: "*.rpm"
          compression-level: 0
          retention-days: 30

  buildrpm:
    name: Build RPM
    if: github.triggering_actor == 'royaloughtness'
    timeout-minutes: 180
    needs: buildsrpm
    runs-on: ${{ inputs.arch == 'x86_64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    container:
      image: ${{ inputs.arch == 'x86_64' && 'fedora:43@sha256:b8f499bee9c97c7c1be0ff7b8b6e4ab72af4216c30d2365c9d474ce2d5c5fd9a' || 'fedora:43@sha256:b5bf856429ce79986e9d80bf58766f6d5b7fad6dab717314539cb7cd0e280f45' }}
      options: --privileged
    steps:
      - name: Enable egress auditing
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Retrieve SRPM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: srpm-artifact

      - name: Build RPM
        shell: bash
        id: rpm_build
        env:
          ARCH: ${{inputs.arch}}
        run: |
          dnf update -y
          dnf install rpm-build mock -y
          SRPM_HASH=$(sha256sum *.rpm)
          echo "SRPM_HASH: ${SRPM_HASH}"
          mock --resultdir=. -r "fedora-43-${ARCH}" --rebuild x264-*.src.rpm

      - name: Surface build log
        if: always()
        run: |
          cat build.log || echo "build.log not found"

      - name: Upload log artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-logs
          path: "*.log"
          retention-days: 30

      - name: Prepare for upload
        shell: bash
        run: |
          rm x264-*.src.rpm

      - name: Save RPM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rpm-artifact
          path: "*.rpm"
          compression-level: 0
          retention-days: 7